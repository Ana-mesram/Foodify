<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Foodify - Nutrición Inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg: #f5f0e8;
  --fg: #1e2a22;
  --card: #ede7db;
  --card-hover: #e6dfd2;
  --primary: #3d7a5f;
  --primary-light: #4a9572;
  --primary-fg: #f5f0e8;
  --primary-glow: rgba(61,122,95,0.25);
  --secondary: #e8dcc8;
  --muted: #9a9487;
  --accent: #5a9e7a;
  --scanner: #4ccea0;
  --border: #d9d1c2;
  --wood: #6b5240;
  --cream: #faf6ef;
  --green-soft: #72b08a;
  --radius: 16px;
  --shadow-card: 0 2px 16px -4px rgba(30,42,34,0.07);
  --shadow-elevated: 0 8px 32px -8px rgba(30,42,34,0.12);
  --shadow-glow: 0 0 24px -4px rgba(61,122,95,0.25);
  --font-display: 'Playfair Display', serif;
  --font-body: 'DM Sans', sans-serif;
}

body{
  font-family: var(--font-body);
  background: #2a2a2a;
  color: var(--fg);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

.phone{
  width:100%;
  max-width:430px;
  height:100dvh;
  max-height:932px;
  background:var(--bg);
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  border-radius:0;
}

@media(min-width:500px){
  .phone{
    border-radius:40px;
    height:min(95vh,900px);
    box-shadow: var(--shadow-elevated), 0 0 0 8px #1a1a1a;
  }
}

/* Status bar */
.status-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 24px 6px;
  font-size:12px;
  font-weight:600;
  color:var(--muted);
  flex-shrink:0;
}

/* Content area */
.content{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding-bottom:80px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.content::-webkit-scrollbar{display:none}

.section{
  padding:16px 20px;
  display:none;
  animation: fadeUp 0.3s ease-out;
}
.section.active{display:block}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

h1.page-title{
  font-family:var(--font-display);
  font-size:26px;
  font-weight:700;
  color:var(--fg);
  margin-bottom:2px;
}
.page-subtitle{
  font-size:13px;
  color:var(--muted);
  margin-bottom:20px;
}

.page-title.foodify {
  font-family: 'Montserrat', sans-serif;
   font-weight: 700;                      /* Negrita */
  letter-spacing: 1.5px;                 /* Espacio entre letras */
  color: #3d7a5f;                        /* Color personalizado (verde principal) */
  margin-top: 24px; 
  text-align: center;                     /* Centrar el título */
}

/* Bottom nav */
.bottom-nav{
  position:absolute;
  bottom:0;left:0;right:0;
  display:flex;
  align-items:center;
  justify-content:space-around;
  background:rgba(250,246,239,0.95);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  padding:8px 8px 20px;
  z-index:10;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;cursor:pointer;
  padding:6px 12px;border-radius:12px;
  color:var(--muted);
  transition:all 0.2s;
  font-family:var(--font-body);
}
.nav-btn.active{color:var(--primary);transform:scale(1.05)}
.nav-btn svg{width:22px;height:22px}
.nav-btn span{font-size:10px;font-weight:600}

/* Cards */
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:var(--shadow-card);
  margin-bottom:12px;
  transition: transform 0.15s;
}
.card:active{transform:scale(0.98)}

/* ============ STATS ============ */
.chart-container{
  display:flex;
  align-items:flex-end;
  gap:12px;
  height:120px;
  padding-top:8px;
}
.chart-bar-wrap{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.chart-bar{
  width:100%;
  border-radius:8px 8px 0 0;
  min-height:6px;
  transition:height 0.5s ease;
}
.chart-label{font-size:9px;color:var(--muted)}
.chart-value{font-size:10px;color:var(--muted);font-weight:600}

.food-item{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;
}
.food-name{font-size:13px;font-weight:600}
.food-date{font-size:10px;color:var(--muted)}

.nutrient-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px;
}
.nutrient-cell{
  display:flex;flex-direction:column;align-items:center;text-align:center;
}
.nutrient-cell .label{font-size:9px;color:var(--muted)}
.nutrient-cell .val{font-size:12px;font-weight:700}
.nutrient-cell .diff{font-size:9px}
.diff.pos{color:var(--primary)}
.diff.neg{color:var(--accent)}

/* ============ SCAN ============ */
.scan-idle{display:flex;flex-direction:column;align-items:center;padding-top:40px}

.scan-ring-outer{
  position:relative;width:192px;height:192px;margin-bottom:32px;
}
.pulse-ring{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(61,122,95,0.08);
  animation:pulseRing 2s ease-out infinite;
}
.pulse-ring:nth-child(2){inset:16px;animation-delay:0.5s;background:rgba(61,122,95,0.12)}
.scan-btn{
  position:absolute;inset:32px;border-radius:50%;
  background:var(--primary);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-glow);
  transition:transform 0.15s;
  color:var(--primary-fg);
}
.scan-btn:active{transform:scale(0.93)}
.scan-btn svg{width:36px;height:36px}

@keyframes pulseRing{
  0%{transform:scale(0.85);opacity:0.6}
  50%{transform:scale(1.08);opacity:0.15}
  100%{transform:scale(0.85);opacity:0.6}
}

.scan-hint{font-size:13px;color:var(--muted);text-align:center;line-height:1.5}

/* Scanner animation */
.scanner-area{
  position:relative;width:224px;height:224px;
  border-radius:24px;background:var(--card);
  border:1px solid var(--border);overflow:hidden;
  box-shadow:var(--shadow-card);margin:0 auto 24px;
  display:flex;align-items:center;justify-content:center;
}
.scanner-icon{color:var(--primary);opacity:0.3}
.scanner-line{
  position:absolute;left:0;right:0;height:2px;
  background:var(--scanner);
  box-shadow:0 0 12px var(--scanner);
  animation:scanLine 2s ease-in-out infinite;
}
@keyframes scanLine{
  0%,100%{top:10%;opacity:0.3}
  50%{top:85%;opacity:1}
}
.scanning-text{font-size:13px;color:var(--muted);text-align:center;animation:blink 1s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* Result panel */
.result-header{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
}
.result-icon{
  width:40px;height:40px;border-radius:12px;
  background:rgba(61,122,95,0.12);
  display:flex;align-items:center;justify-content:center;
  color:var(--primary);
}
.result-name{font-size:15px;font-weight:600}
.result-sub{font-size:11px;color:var(--muted)}

.slider-group{margin-bottom:14px}
.slider-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;
}
.slider-label{font-size:12px;font-weight:500}
.slider-value{font-size:12px;font-weight:700}
.slider-diff{font-size:10px;margin-left:6px}

input[type="range"]{
  -webkit-appearance:none;appearance:none;
  width:100%;height:6px;border-radius:3px;
  background:var(--border);outline:none;cursor:pointer;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:20px;height:20px;border-radius:50%;
  background:var(--primary);cursor:pointer;
  box-shadow:var(--shadow-glow);
}

.save-btn{
  width:100%;padding:14px;border:none;border-radius:var(--radius);
  background:var(--primary);color:var(--primary-fg);
  font-family:var(--font-body);font-size:14px;font-weight:600;
  cursor:pointer;box-shadow:var(--shadow-glow);
  transition:all 0.15s;margin-top:8px;
}
.save-btn:active{transform:scale(0.97)}

/* Saved confirmation */
.saved-check{
  display:flex;flex-direction:column;align-items:center;
  padding-top:60px;animation:fadeUp 0.3s ease-out;
}
.check-circle{
  width:72px;height:72px;border-radius:50%;
  background:rgba(61,122,95,0.12);
  display:flex;align-items:center;justify-content:center;
  color:var(--primary);margin-bottom:16px;
}
.saved-title{font-weight:600;font-size:16px;margin-bottom:4px}
.saved-sub{font-size:13px;color:var(--muted)}

/* ============ RECOMMENDATIONS ============ */
.rec-card{
  display:flex;gap:12px;align-items:flex-start;
}
.rec-icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.rec-icon.green{background:rgba(61,122,95,0.1);color:var(--primary)}
.rec-icon.teal{background:rgba(76,206,160,0.12);color:#3aaf86}
.rec-icon.warm{background:rgba(107,82,64,0.1);color:var(--wood)}
.rec-icon.soft{background:rgba(114,176,138,0.12);color:var(--green-soft)}
.rec-title{font-size:13px;font-weight:600;margin-bottom:2px}
.rec-desc{font-size:11px;color:var(--muted);line-height:1.5}

/* ============ PROFILE ============ */
.profile-header{
  display:flex;align-items:center;gap:16px;
}
.avatar{
  width:64px;height:64px;border-radius:50%;
  background:rgba(61,122,95,0.12);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:26px;font-weight:700;
  color:var(--primary);flex-shrink:0;
}
.profile-name{font-size:18px;font-weight:600}
.profile-meta{font-size:11px;color:var(--muted)}

.stats-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;
}
.stat-card{
  background:var(--card);border-radius:var(--radius);
  padding:14px;box-shadow:var(--shadow-card);
  display:flex;flex-direction:column;align-items:center;text-align:center;
}
.stat-card svg{color:var(--primary);margin-bottom:8px}
.stat-val{font-size:18px;font-weight:700}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px}

.settings-list{
  background:var(--card);border-radius:var(--radius);
  padding:4px 16px;box-shadow:var(--shadow-card);
}
.settings-item{
  padding:12px 0;font-size:13px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:color 0.15s;background:none;border-left:0;border-right:0;border-top:0;
  width:100%;text-align:left;font-family:var(--font-body);color:var(--fg);
}
.settings-item:last-child{border-bottom:none}
.settings-item:hover{color:var(--primary)}

/* Hide scrollbar */
.content{scrollbar-width:none;-ms-overflow-style:none}

/* SVG icons inline */
.icon{display:inline-block;vertical-align:middle}
</style>
</head>
<body>

<div class="phone">
  <div class="status-bar">
    <h1 class="page-title foodify">FOODIFY</h1>
  </div>

  <div class="content">
    <!-- STATS -->
    <div id="sec-stats" class="section">
      <h1 class="page-title">Estadísticas</h1>
      <p class="page-subtitle">Tu progreso nutricional</p>
      <div class="card">
        <div style="font-size:13px;font-weight:600;margin-bottom:10px">Resumen semanal</div>
        <div class="chart-container" id="weekly-chart"></div>
      </div>
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">Registro de alimentos</div>
      <div id="food-log"></div>
    </div>

    <!-- SCAN -->
    <div id="sec-scan" class="section active">
      <h1 class="page-title">Escanear</h1>
      <p class="page-subtitle">Analiza y modifica tus alimentos</p>
      <div id="scan-content"></div>
    </div>

    <!-- RECOMMENDATIONS -->
    <div id="sec-recs" class="section">
      <h1 class="page-title">Recomendaciones</h1>
      <p class="page-subtitle">Mejora tu alimentación con estos consejos</p>
      <div id="recs-list"></div>
    </div>

    <!-- PROFILE -->
    <div id="sec-profile" class="section">
      <h1 class="page-title">Perfil</h1>
      <div id="profile-content"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn" data-tab="stats" onclick="switchTab('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-8"/></svg>
      <span>Estadísticas</span>
    </button>
    <button class="nav-btn active" data-tab="scan" onclick="switchTab('scan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 012-2h2"/><path d="M17 3h2a2 2 0 012 2v2"/><path d="M21 17v2a2 2 0 01-2 2h-2"/><path d="M7 21H5a2 2 0 01-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
      <span>Escanear</span>
    </button>
    <button class="nav-btn" data-tab="recs" onclick="switchTab('recs')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 015 11.9V17H7v-3.1A7 7 0 0112 2z"/></svg>
      <span>Tips</span>
    </button>
    <button class="nav-btn" data-tab="profile" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Perfil</span>
    </button>
  </nav>
</div>

<script>
// ── DATA ──
const foodLog = [
  { id:'1', name:'Manzana', date:'2026-03-10',
    nutrients:{protein:0.5,fat:0.3,carbs:14,vitamins:8,calories:52},
    modified:{protein:2,fat:0.3,carbs:10,vitamins:12,calories:48}},
  { id:'2', name:'Pollo a la plancha', date:'2026-03-10',
    nutrients:{protein:31,fat:3.6,carbs:0,vitamins:6,calories:165},
    modified:{protein:38,fat:2,carbs:0,vitamins:10,calories:170}},
  { id:'3', name:'Arroz integral', date:'2026-03-09',
    nutrients:{protein:2.6,fat:0.9,carbs:23,vitamins:4,calories:111},
    modified:{protein:5,fat:0.5,carbs:18,vitamins:7,calories:95}},
];

const sampleFoods = [
  {name:'Huevo cocido', emoji:'🥚', nutrients:{protein:13,fat:11,carbs:1.1,vitamins:7,calories:155}},
  {name:'Plátano', emoji:'🍌', nutrients:{protein:1.3,fat:0.3,carbs:27,vitamins:10,calories:105}},
  {name:'Salmón', emoji:'🐟', nutrients:{protein:25,fat:13,carbs:0,vitamins:15,calories:208}},
  {name:'Agua de coco', emoji:'🥛', nutrients:{protein:10,fat:0.7,carbs:0.6,vitamins:5,calories:29}},
  {name:'Aguacate', emoji:'🥑', nutrients:{protein:2,fat:15,carbs:9,vitamins:12,calories:160}},
  {name:'Avena', emoji:'🌾', nutrients:{protein:5,fat:2.5,carbs:27,vitamins:6,calories:150}},
];

const nutrientLabels = {protein:'Prot',fat:'Gras',carbs:'Carb',vitamins:'Vita',calories:'Kcal'};
const nutrientFull = {protein:'Proteínas (g)',fat:'Grasas (g)',carbs:'Carbohidratos (g)',vitamins:'Vitaminas (%)',calories:'Calorías (kcal)'};
const nutrientMax = {protein:60,fat:40,carbs:80,vitamins:100,calories:500};
const barColors = ['#3d7a5f','#5a9e7a','#72b08a','#4ccea0','#6b5240'];

const recommendations = [
  {title:'Aumenta tus proteínas',desc:'Incluye huevos o legumbres en tu desayuno para mejorar la recuperación muscular.',cls:'green',
   icon:'<path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>'},
  {title:'Reduce carbohidratos nocturnos',desc:'Opta por verduras y proteínas en la cena para mejorar la calidad del sueño.',cls:'teal',
   icon:'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>'},
  {title:'Más vitamina C',desc:'Añade cítricos o pimientos a tu almuerzo para reforzar tu sistema inmune.',cls:'soft',
   icon:'<path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/>'},
  {title:'Fibra para tu digestión',desc:'Incorpora avena o chía en tu primera comida del día para una mejor digestión.',cls:'green',
   icon:'<path d="M17 8C8 10 5.9 16.17 3.82 21.34l1.89.66L12 14l4 8 3-6 3 4"/><path d="M20.2 2.8a1 1 0 00-1.4 0L12 9.6 5.2 2.8a1 1 0 00-1.4 1.4L12 12.4l8.2-8.2a1 1 0 000-1.4z"/>'},
  {title:'Control calórico',desc:'Sustituye salsas industriales por especias naturales para reducir calorías extras.',cls:'warm',
   icon:'<path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.07-2.14 0-5.5 3-7 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.15.5-2.25 1.5-3"/>'},
  {title:'Snacks inteligentes',desc:'Elige frutos secos o fruta fresca entre comidas para mantener tu energía estable.',cls:'teal',
   icon:'<circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/>'},
];

// ── NAVIGATION ──
let currentTab = 'scan';

function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + tab).classList.add('active');
  document.querySelector('[data-tab="'+tab+'"]').classList.add('active');
  currentTab = tab;

  if (tab === 'stats') renderStats();
  if (tab === 'scan') renderScanIdle();
  if (tab === 'recs') renderRecs();
  if (tab === 'profile') renderProfile();

  document.querySelector('.content').scrollTop = 0;
}

// ── STATS ──
function renderStats() {
  // Weekly chart
  const totals = {protein:0,fat:0,carbs:0,vitamins:0,calories:0};
  foodLog.forEach(e => {
    for(const k in e.modified) totals[k] += e.modified[k];
  });
  const maxV = Math.max(...Object.values(totals), 1);
  const keys = Object.keys(totals);

  document.getElementById('weekly-chart').innerHTML = keys.map((k,i) =>
    `<div class="chart-bar-wrap">
      <div class="chart-value">${totals[k].toFixed(1)}</div>
      <div class="chart-bar" style="height:${(totals[k]/maxV)*100}%;background:${barColors[i]}"></div>
      <div class="chart-label">${nutrientLabels[k]}</div>
    </div>`
  ).join('');

  // Food log
  document.getElementById('food-log').innerHTML = foodLog.map(e => {
    const cells = keys.map(k => {
      const diff = e.modified[k] - e.nutrients[k];
      const cls = diff > 0 ? 'pos' : diff < 0 ? 'neg' : '';
      return `<div class="nutrient-cell">
        <div class="label">${nutrientLabels[k]}</div>
        <div class="val">${e.modified[k]}</div>
        <div class="diff ${cls}">${diff > 0 ? '+' : ''}${diff.toFixed(1)}</div>
      </div>`;
    }).join('');
    return `<div class="card">
      <div class="food-item">
        <span class="food-name">${e.name}</span>
        <span class="food-date">${e.date}</span>
      </div>
      <div class="nutrient-grid">${cells}</div>
    </div>`;
  }).join('');
}

// ── SCAN ──
let scanPhase = 'idle';
let scannedFood = null;
let modifiedValues = {};

function renderScanIdle() {
  scanPhase = 'idle';
  document.getElementById('scan-content').innerHTML = `
    <div class="scan-idle">
      <div class="scan-ring-outer">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <button class="scan-btn" onclick="startScan()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7V5a2 2 0 012-2h2"/><path d="M17 3h2a2 2 0 012 2v2"/>
            <path d="M21 17v2a2 2 0 01-2 2h-2"/><path d="M7 21H5a2 2 0 01-2-2v-2"/>
            <line x1="7" y1="12" x2="17" y2="12"/>
          </svg>
        </button>
      </div>
      <p class="scan-hint">Pulsa para escanear<br>un alimento</p>
    </div>`;
}

function startScan() {
  scanPhase = 'scanning';
  document.getElementById('scan-content').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;padding-top:32px;animation:fadeUp 0.3s ease-out">
      <div class="scanner-area">
        <svg class="scanner-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 3l1.45 4.35L18 9l-4.55 1.65L12 15l-1.45-4.35L6 9l4.55-1.65z"/>
        </svg>
        <div class="scanner-line"></div>
      </div>
      <p class="scanning-text">Escaneando alimento...</p>
    </div>`;

  setTimeout(() => {
    scannedFood = sampleFoods[Math.floor(Math.random() * sampleFoods.length)];
    modifiedValues = {...scannedFood.nutrients};
    renderResult();
  }, 2200);
}

// Inicializa sliders y actualizaciones
function renderResult() {
  scanPhase = 'result';

  const keys = Object.keys(scannedFood.nutrients).filter(k => k !== 'calories' && k !== 'vitamins');

  const sliders = keys.map(k => {
    const cur = modifiedValues[k];
    const diff = cur - scannedFood.nutrients[k];
    const diffStr = diff !== 0 ? `<span class="slider-diff" style="color:${diff>0?'var(--primary)':'var(--accent)'}">(${diff>0?'+':''}${diff.toFixed(1)})</span>` : '';

    return `
    <div class="slider-group" style="margin-bottom:18px">
      <div class="slider-header" style="display:flex;justify-content:space-between;align-items:center">
        <span class="slider-label" style="flex:1">${nutrientFull[k]}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span class="slider-value" id="sv-${k}">${cur}</span>
          ${diffStr}
          <button style="background:none;border:none;color:#999;font-size:16px" onclick="resetSlider('${k}')">⟲</button>
        </span>
      </div>
      <div style="position:relative">
  <input type="range" id="range-${k}" min="0" max="${nutrientMax[k]}" step="0.5" value="${cur}" 
    oninput="updateSlider('${k}', this.value)" style="width:100%;">
  <div class="slider-fill" id="fill-${k}" style="
    position:absolute;left:0;top:50%;height:6px;transform:translateY(-50%);
    background:var(--primary);border-radius:4px;width:${(cur/nutrientMax[k])*100}%;
    pointer-events:none;"></div>
  <div class="slider-diff" style="font-size:10px;margin-top:4px;color:${diff>0?'var(--primary)':diff<0?'var(--accent)':''}">${diff !== 0 ? (diff>0?'+':'')+diff.toFixed(1) : ''}</div>
</div>
    </div>`;
  }).join('');

  // Contador de calorías
  const calWidth = (modifiedValues.calories/nutrientMax.calories)*100;
const caloriesDisplay = `
  <div class="slider-group" style="margin-top:40px; margin-bottom:18px">
    <div class="slider-header" style="display:flex;justify-content:space-between;align-items:center">
      <span class="slider-label">Calorías (kcal)</span>
      <span id="sv-calories">${Math.round(modifiedValues.calories)}</span>
    </div>
  </div>
`;

  document.getElementById('scan-content').innerHTML = `
    <div style="animation:fadeUp 0.3s ease-out">
      <div class="card">
        <div class="result-header">
          <div class="result-icon">${scannedFood.emoji}</div>
          <div>
            <div class="result-name">${scannedFood.name}</div>
            <div class="result-sub">Alimento detectado</div>
          </div>
        </div>
        ${sliders}
        ${caloriesDisplay}
      </div>
<div style="display:flex;gap:12px;margin-top:12px">
  <button class="save-btn" style="flex:1;background:#ccc;color:#333" onclick="renderScanIdle()">Cancelar</button>
  <button class="save-btn" style="flex:1" onclick="saveFood()">Aplicar modificación</button>
</div>
    </div>`;
}

function updateSlider(key, value) {
  modifiedValues[key] = parseFloat(value);

  // Actualiza valor visual
  document.getElementById('sv-' + key).textContent = modifiedValues[key];

  // Actualiza barra de progreso verde
  const fill = document.getElementById('fill-' + key);
  fill.style.width = (modifiedValues[key]/nutrientMax[key])*100 + '%';

  // 🔹 Actualiza diferencia debajo de la barra
  const diff = modifiedValues[key] - scannedFood.nutrients[key];
  const diffEl = document.querySelector(`#range-${key}`).parentElement.querySelector('.slider-diff');
  if (diffEl) {
    diffEl.textContent = (diff > 0 ? '+' : '') + diff.toFixed(1);
    diffEl.style.color = diff > 0 ? 'var(--primary)' : diff < 0 ? 'var(--accent)' : '';
  }

  // Recalcular calorías
  modifiedValues.calories = (modifiedValues.protein*4) + (modifiedValues.carbs*4) + (modifiedValues.fat*9);
  document.getElementById('sv-calories').textContent = Math.round(modifiedValues.calories);
}

// Reset individual
function resetSlider(key) {
  const orig = scannedFood.nutrients[key];
  document.getElementById('range-' + key).value = orig;
  updateSlider(key, orig);
}

// Reset todos los sliders
function resetAllSliders() {
  ['protein','fat','carbs'].forEach(k => {
    const orig = scannedFood.nutrients[k];
    document.getElementById('range-' + k).value = orig;
    updateSlider(k, orig);
  });
}



// ── Rellenar slider verde según porcentaje ──
function updateSliderBackground(key) {
  const slider = document.getElementById('range-' + key);
  const val = slider.value;
  const max = slider.max;
  const perc = (val / max) * 100;
  slider.style.background = `linear-gradient(to right, var(--primary) 0%, var(--primary) ${perc}%, var(--border) ${perc}%, var(--border) 100%)`;
}

function saveFood() {
  foodLog.unshift({
    id: Date.now().toString(),
    name: scannedFood.name,
    date: new Date().toISOString().split('T')[0],
    nutrients: {...scannedFood.nutrients},
    modified: {...modifiedValues}
  });

  document.getElementById('scan-content').innerHTML = `
    <div class="saved-check">
      <div class="check-circle">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="saved-title">¡Guardado!</div>
      <div class="saved-sub">Alimento registrado en tus estadísticas</div>
    </div>`;

  setTimeout(renderScanIdle, 1500);
}

// ── RECOMMENDATIONS ──
function renderRecs() {
  document.getElementById('recs-list').innerHTML = recommendations.map(r =>
    `<div class="card rec-card">
      <div class="rec-icon ${r.cls}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${r.icon}</svg>
      </div>
      <div>
        <div class="rec-title">${r.title}</div>
        <div class="rec-desc">${r.desc}</div>
      </div>
    </div>`
  ).join('');
}

// ── PROFILE ──
function renderProfile() {
  const total = foodLog.length;
  // Most adjusted nutrient
  const diffs = {protein:0,fat:0,carbs:0,vitamins:0,calories:0};
  foodLog.forEach(e => {
    for(const k in e.nutrients) diffs[k] += Math.abs(e.modified[k] - e.nutrients[k]);
  });
  const topN = Object.entries(diffs).sort((a,b)=>b[1]-a[1])[0];
  const topName = {protein:'Proteínas',fat:'Grasas',carbs:'Carbohidratos',vitamins:'Vitaminas',calories:'Calorías'}[topN[0]];

  document.getElementById('profile-content').innerHTML = `
    <div class="card" style="margin-top:8px">
      <div class="profile-header">
        <div class="avatar">A</div>
        <div>
          <div class="profile-name">Alejandro M.</div>
          <div class="profile-meta">Objetivo: Ganar músculo</div>
          <div class="profile-meta">Actividad: Moderada-Alta</div>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3z"/></svg>
        <div class="stat-val">${total}</div>
        <div class="stat-label">Alimentos modificados</div>
      </div>
      <div class="stat-card">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <div class="stat-val">14</div>
        <div class="stat-label">Días activo</div>
      </div>
      <div class="stat-card">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        <div class="stat-val" style="font-size:14px">${topName}</div>
        <div class="stat-label">Más ajustado</div>
      </div>
      <div class="stat-card">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <div class="stat-val">Alta</div>
        <div class="stat-label">Nivel actividad</div>
      </div>
    </div>

    <div class="settings-list" style="margin-top:12px">
      <button class="settings-item">Editar perfil</button>
      <button class="settings-item">Objetivos nutricionales</button>
      <button class="settings-item">Notificaciones</button>
      <button class="settings-item">Acerca de Foodify</button>
    </div>`;
}

// ── INIT ──
renderScanIdle();
</script>
</body>
</html>
